name: 🏗️ Build GoldClip Project
on:
  workflow_dispatch:
  push:
    paths:
      - 'build_goldclip.py'
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python build_goldclip.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "🤖 Auto-generated files" && git push)

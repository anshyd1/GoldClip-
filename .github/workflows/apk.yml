name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate project files
        run: python3 build_goldclip.py

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Verify
        run: |
          java -version
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la app/src/main/

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: List APK output
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GoldClip-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GoldClip v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
          body: |
            GoldClip APK ready!
            
            Install:
            1. Download app-debug.apk
            2. Enable "Install from unknown sources" on phone
            3. Tap APK to install
            4. Open app, enable Accessibility, allow Overlay, start
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

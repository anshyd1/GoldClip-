name: 📱 Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '*.gradle'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5 || true
          # Fallback: use system gradle if wrapper fails
          if [ ! -f gradlew ]; then
            echo "Using system gradle"
          fi
          chmod +x gradlew 2>/dev/null || true

      - name: 🏗️ Build Debug APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoldClip-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 🚀 Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: GoldClip Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
          body: |
            ## ✦ GoldClip APK
            
            **Direct install:** APK file neeche download karo, phone pe tap → install
            
            ### Requirements
            - Android 7.0+
            - Enable "Install from unknown sources"
            
            ### After Install
            1. App kholo
            2. Step 1 → Enable Accessibility (GoldClip)
            3. Step 2 → Allow Overlay
            4. Step 3 → Start GoldClip
            5. Gold ball right side pe dikhegi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

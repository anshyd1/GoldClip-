name: 📱 Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'settings.gradle'
      - 'build.gradle'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: 📦 Install Gradle 8.5 manually
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          echo "$HOME/gradle-8.5/bin" >> $GITHUB_PATH

      - name: ✅ Verify tools
        run: |
          gradle --version
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace --info

      - name: 📋 Show APK location
        if: always()
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Build outputs ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No build folder"

      - name: 📤 Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GoldClip-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "✦ GoldClip v1.0.${{ github.run_number }}"
          files: app/build/outputs/apk/debug/*.apk
          body: |
            ## ✦ GoldClip APK Ready!
            
            **📲 Install:** Neeche `app-debug.apk` download → phone pe tap → install
            
            ### Setup After Install
            1. App kholo
            2. Step 1 → Accessibility → GoldClip ON
            3. Step 2 → Overlay permission
            4. Step 3 → Start GoldClip
            5. 🎉 Gold ball right side pe dikhegi!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
